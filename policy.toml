# gp-monitor command allowlist
#
# Este archivo define los comandos PowerShell que el agente puede ejecutar
# cuando el operador envia un task type='RunCommand' SIN allow_arbitrary.
#
# Convencion: si el patron TERMINA en '*', se interpreta como PREFIJO
# (matchea cualquier comando que EMPIECE con el texto antes del '*', con
# cualquier cosa que siga, incluso un argumento pegado sin espacio).
# Si NO termina en '*', requiere un espacio o fin de string despues
# (estricto, evita falsos positivos como 'Get' matcheando 'Get-Process').
#
# Para agregar un comando seguro:
#   [[allowed]]
#   pattern = "Comando-Seguro*"
#   description = "Descripcion legible para el dashboard"
#
# ⚠️  PELIGRO: cualquier cambio aqui se aplica al agente sin reinicio.
#   Editar con cuidado. Cambios que agreguen comandos peligrosos son
#   responsabilidad del operador.
#
# Comandos que NUNCA se deben agregar (peligro de seguridad):
#   - Restart-Computer
#   - Remove-Item con path C:\*
#   - Format-Volume
#   - Stop-Service con servicios criticos
#   - Invoke-WebRequest a URLs externas (data exfiltration)
#   - Set-ItemProperty en claves del sistema

# ─── Comandos basicos de inspeccion ────────────────────────────────────────
[[allowed]]
pattern = "Get-Process*"
description = "Listar procesos del sistema"

[[allowed]]
pattern = "Get-Service*"
description = "Listar servicios de Windows"

[[allowed]]
